<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildMart | Your Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
  .cart-page { max-width: 900px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);}
  h2 { text-align:center; margin-bottom: 20px; }
  .cart-items { margin-bottom: 20px; }
  .cart-item { display:flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; background:#fafafa;}
  .cart-item button { background:red; color:white; border:none; border-radius:6px; cursor:pointer; padding:4px 10px; }
  .summary { margin-top:20px; font-size:18px; display:flex; justify-content: space-between; }
  .address-section, .payment-section { margin-top:20px; }
  textarea { width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; resize:none; }
  select { width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; }
  .cta { margin-top:15px; padding:12px 25px; font-weight:700; border:none; border-radius:12px; background:linear-gradient(135deg,#111827,#1f2937); color:white; cursor:pointer; transition:all .25s ease; display:block; width:100%; text-align:center;}
  .cta:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 8px 20px rgba(0,0,0,0.6),0 0 15px rgba(255,184,3,0.8);}
</style>
</head>
<body>

<div class="cart-page">
  <h2>Your Cart</h2>
  <div class="cart-items" id="cartItems"></div>

  <div class="summary">
    <span>Delivery Charges:</span>
    <span>₹<span id="deliveryCharge">50</span></span>
  </div>
  <div class="summary">
    <strong>Total Amount:</strong>
    <strong>₹<span id="totalAmount">0</span></strong>
  </div>

  <div class="address-section">
    <h3>Delivery Address</h3>
    <textarea id="userAddress" placeholder="Enter your full address"></textarea>
  </div>

  <div class="payment-section">
    <h3>Payment Method</h3>
    <select id="paymentMethod">
      <option value="cod">Cash on Delivery</option>
      <option value="upi">UPI</option>
      <option value="netbanking">Netbanking</option>
    </select>
  </div>

  <button class="cta" id="confirmOrder">Confirm Order</button>
  <button class="cta" id="helpBtn">Help / Support</button>
</div>

<script>
// DELIVERY CHARGES
const deliveryCharge = parseInt(document.getElementById('deliveryCharge').textContent);
let cart = JSON.parse(localStorage.getItem('cart')) || [];

// RENDER CART ITEMS
function renderCart() {
  const cartItemsContainer = document.getElementById('cartItems');
  cartItemsContainer.innerHTML = '';
  let total = 0;

  if(cart.length === 0) {
    cartItemsContainer.innerHTML = '<p>Your cart is empty!</p>';
  } else {
    cart.forEach((item, index) => {
      total += item.price * item.qty;
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `
        <span>${item.name} x ${item.qty}</span>
        <span>₹${item.price * item.qty}</span>
        <button onclick="removeItem(${index})">Remove</button>
      `;
      cartItemsContainer.appendChild(div);
    });
  }

  document.getElementById('totalAmount').textContent = total + deliveryCharge;
}

// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

// CONFIRM ORDER
document.getElementById('confirmOrder').addEventListener('click', () => {
  const address = document.getElementById('userAddress').value.trim();
  const payment = document.getElementById('paymentMethod').value;
  if(cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }
  if(address === '') {
    alert("Please enter your delivery address!");
    return;
  }
  alert(`Order Confirmed!\nTotal: ₹${document.getElementById('totalAmount').textContent}\nPayment: ${payment}\nAddress: ${address}`);
  localStorage.removeItem('cart');
  cart = [];
  renderCart();
});

// HELP / SUPPORT
document.getElementById('helpBtn').addEventListener('click', () => {
  const concern = prompt("Please describe your concern or query:");
  if(concern) alert("Thank you! Our support team will contact you soon.");
});

// INITIAL RENDER
renderCart();
</script>

</body>
</html>
