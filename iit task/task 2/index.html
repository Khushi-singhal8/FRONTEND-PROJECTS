<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dot Connection Task</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Task-02: Connect the Dots</h2>
  <div class="canvas-container">
    <svg id="svgArea"></svg>
    <div class="dots">
      <div class="dot" id="A">A</div>
      <div class="dot" id="B">B</div>
      <div class="dot" id="C">C</div>
      <div class="dot" id="D">D</div>
      <div class="dot" id="E">E</div>
      <div class="dot" id="F">F</div>
    </div>
  </div>
  <div class="buttons">
    <button onclick="checkConnections()">Check</button>
    <button onclick="resetConnections()">Reset</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
